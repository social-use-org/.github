  <text x="356" y="444" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#475569">评论、私信、用户标签</text>
  <text x="356" y="472" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#475569">客服跟进和私域转化</text>

  <rect x="640" y="374" width="320" height="150" rx="18" fill="#F5F3FF" stroke="#DDD6FE"/>
  <circle cx="684" cy="420" r="22" fill="#7C3AED"/>
  <text x="684" y="426" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#FFFFFF">6</text>
  <text x="724" y="412" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#5B21B6">数据分析</text>
  <text x="724" y="444" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#475569">内容表现、平台对比</text>
  <text x="724" y="472" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#475569">标题效果和增长建议</text>

  <rect x="1008" y="374" width="320" height="150" rx="18" fill="#F8FAFC" stroke="#CBD5E1"/>
  <circle cx="1052" cy="420" r="22" fill="#334155"/>
  <text x="1052" y="426" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#FFFFFF">7</text>
  <text x="1092" y="412" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#0F172A">团队协作</text>
  <text x="1092" y="444" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#475569">角色权限、审核中心</text>
  <text x="1092" y="472" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#475569">适合 MCN 和代运营团队</text>

  <path d="M408 239H456" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round"/>
  <path d="M776 239H824" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round"/>
  <path d="M1144 239H1192" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round"/>
  <path d="M592 449H640" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round"/>
  <path d="M960 449H1008" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round"/>

  <text x="800" y="584" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#334155">内容生产、矩阵分发、Agent 自动化、互动增长和数据优化，组合成社媒运营闭环。</text>
</svg>
