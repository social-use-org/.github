<svg width="1600" height="620" viewBox="0 0 1600 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Social-use capability map">
  <rect x="1" y="1" width="1598" height="618" rx="28" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <text x="88" y="76" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#0F172A">核心能力地图</text>
  <text x="88" y="112" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="500" fill="#64748B">面向 MCN、品牌团队、电商增长和跨境社媒运营的完整能力闭环</text>

  <rect x="88" y="164" width="320" height="150" rx="18" fill="#EFF6FF" stroke="#BFDBFE"/>
  <circle cx="132" cy="210" r="22" fill="#2563EB"/>
  <text x="132" y="216" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#FFFFFF">1</text>
  <text x="172" y="202" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#1E3A8A">AI 内容生产</text>
  <text x="172" y="234" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#475569">选题、标题、文案、脚本</text>
  <text x="172" y="262" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#475569">图文、短视频、多语言复用</text>

  <rect x="456" y="164" width="320" height="150" rx="18" fill="#F0FDF4" stroke="#BBF7D0"/>
  <circle cx="500" cy="210" r="22" fill="#16A34A"/>
  <text x="500" y="216" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#FFFFFF">2</text>
  <text x="540" y="202" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#166534">多平台分发</text>
  <text x="540" y="234" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#475569">小红书、抖音、X、YouTube</text>
  <text x="540" y="262" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#475569">定时、批量、草稿和预览</text>

  <rect x="824" y="164" width="320" height="150" rx="18" fill="#FFF7ED" stroke="#FED7AA"/>
  <circle cx="868" cy="210" r="22" fill="#F97316"/>
  <text x="868" y="216" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#FFFFFF">3</text>
  <text x="908" y="202" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#9A3412">账号矩阵</text>
  <text x="908" y="234" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#475569">品牌号、达人号、垂类号</text>
  <text x="908" y="262" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#475569">策略、频率、权限和审核</text>

  <rect x="1192" y="164" width="320" height="150" rx="18" fill="#FDF2F8" stroke="#FBCFE8"/>
  <circle cx="1236" cy="210" r="22" fill="#DB2777"/>
  <text x="1236" y="216" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#FFFFFF">4</text>
  <text x="1276" y="202" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#9D174D">Agent 自动化</text>
  <text x="1276" y="234" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#475569">MCP 工具、VNC 查看</text>
  <text x="1276" y="262" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#475569">指纹设备、纯净 IP 环境</text>

  <rect x="272" y="374" width="320" height="150" rx="18" fill="#ECFEFF" stroke="#A5F3FC"/>
  <circle cx="316" cy="420" r="22" fill="#0891B2"/>
  <text x="316" y="426" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#FFFFFF">5</text>
