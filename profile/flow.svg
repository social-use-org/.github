    <text x="430" y="306" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" fill="#0F172A">AI 创作</text>
    <text x="430" y="334" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="500" fill="#64748B">文案和脚本</text>
  </g>

  <g>
