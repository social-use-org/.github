<svg width="1600" height="420" viewBox="0 0 1600 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Social-use workflow illustration">
  <defs>
    <linearGradient id="bg" x1="120" y1="54" x2="1478" y2="382" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07101C"/>
      <stop offset="1" stop-color="#0D2540"/>
    </linearGradient>
    <linearGradient id="line" x1="180" y1="210" x2="1420" y2="210" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34D399"/>
      <stop offset="1" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="card1" x1="140" y1="120" x2="340" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10233F"/>
      <stop offset="1" stop-color="#0B172A"/>
    </linearGradient>
    <linearGradient id="card2" x1="372" y1="120" x2="572" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F2A1F"/>
      <stop offset="1" stop-color="#081713"/>
    </linearGradient>
    <linearGradient id="card3" x1="604" y1="120" x2="804" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#12233D"/>
      <stop offset="1" stop-color="#0B172A"/>
    </linearGradient>
    <linearGradient id="card4" x1="836" y1="120" x2="1036" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#102A1E"/>
      <stop offset="1" stop-color="#081713"/>
    </linearGradient>
    <linearGradient id="card5" x1="1068" y1="120" x2="1268" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#26171B"/>
      <stop offset="1" stop-color="#160D11"/>
    </linearGradient>
    <linearGradient id="card6" x1="1300" y1="120" x2="1500" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1A1F2F"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="420" rx="32" fill="url(#bg)"/>
  <path d="M170 210H1430" stroke="url(#line)" stroke-width="6" stroke-linecap="round" stroke-dasharray="2 18"/>

  <g>
    <rect x="120" y="116" width="200" height="188" rx="24" fill="url(#card1)" stroke="#60A5FA" stroke-opacity="0.20"/>
    <circle cx="220" cy="166" r="22" fill="#60A5FA"/>
    <text x="220" y="170" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#08111F">1</text>
    <text x="220" y="230" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#E2E8F0">输入主题</text>
    <text x="220" y="258" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="500" fill="#94A3B8">一句话说明要做什么</text>
  </g>

  <g>
    <rect x="352" y="116" width="200" height="188" rx="24" fill="url(#card2)" stroke="#34D399" stroke-opacity="0.20"/>
    <circle cx="452" cy="166" r="22" fill="#34D399"/>
    <text x="452" y="170" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#07111A">2</text>
    <text x="452" y="230" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#E2E8F0">AI 创作</text>
    <text x="452" y="258" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="500" fill="#94A3B8">生成标题、文案和版本</text>
  </g>

  <g>
    <rect x="584" y="116" width="200" height="188" rx="24" fill="url(#card3)" stroke="#60A5FA" stroke-opacity="0.20"/>
    <circle cx="684" cy="166" r="22" fill="#60A5FA"/>
    <text x="684" y="170" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#08111F">3</text>
    <text x="684" y="230" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#E2E8F0">人工审核</text>
    <text x="684" y="258" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="500" fill="#94A3B8">确认后再进入发布</text>
  </g>

  <g>
    <rect x="816" y="116" width="200" height="188" rx="24" fill="url(#card4)" stroke="#34D399" stroke-opacity="0.20"/>
    <circle cx="916" cy="166" r="22" fill="#34D399"/>
    <text x="916" y="170" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#07111A">4</text>
    <text x="916" y="230" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#E2E8F0">多平台发布</text>
    <text x="916" y="258" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="500" fill="#94A3B8">一键同步到多个账号</text>
  </g>

  <g>
    <rect x="1048" y="116" width="200" height="188" rx="24" fill="url(#card5)" stroke="#F59E0B" stroke-opacity="0.20"/>
    <circle cx="1148" cy="166" r="22" fill="#F59E0B"/>
    <text x="1148" y="170" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#0D0A09">5</text>
    <text x="1148" y="230" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#E2E8F0">互动运营</text>
    <text x="1148" y="258" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="500" fill="#94A3B8">评论、私信、用户跟进</text>
  </g>

  <g>
    <rect x="1280" y="116" width="200" height="188" rx="24" fill="url(#card6)" stroke="#94A3B8" stroke-opacity="0.20"/>
    <circle cx="1380" cy="166" r="22" fill="#94A3B8"/>
    <text x="1380" y="170" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#08111F">6</text>
    <text x="1380" y="230" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#E2E8F0">数据分析</text>
    <text x="1380" y="258" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="500" fill="#94A3B8">找到下一步优化方向</text>
  </g>

  <path d="M320 210H352" stroke="#34D399" stroke-width="3" stroke-linecap="round"/>
  <path d="M342 202L352 210L342 218" stroke="#34D399" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M552 210H584" stroke="#60A5FA" stroke-width="3" stroke-linecap="round"/>
  <path d="M574 202L584 210L574 218" stroke="#60A5FA" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M784 210H816" stroke="#34D399" stroke-width="3" stroke-linecap="round"/>
  <path d="M806 202L816 210L806 218" stroke="#34D399" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M1016 210H1048" stroke="#F59E0B" stroke-width="3" stroke-linecap="round"/>
  <path d="M1038 202L1048 210L1038 218" stroke="#F59E0B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M1248 210H1280" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>
  <path d="M1270 202L1280 210L1270 218" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="800" y="360" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#E2E8F0">从输入到发布，再到互动和分析，形成完整闭环</text>
  <text x="800" y="388" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#94A3B8">这张图更适合快速理解 Social-use 的工作流，而不是只看功能名词。</text>
</svg>
