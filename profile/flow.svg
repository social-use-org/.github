    <text x="670" y="306" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" fill="#0F172A">人工审核</text>
    <text x="670" y="334" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="500" fill="#64748B">确认风险</text>
  </g>

  <g>
    <circle cx="910" cy="228" r="38" fill="#FCE7F3" stroke="#DB2777" stroke-width="3"/>
    <text x="910" y="236" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#BE185D">4</text>
    <text x="910" y="306" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" fill="#0F172A">矩阵发布</text>
    <text x="910" y="334" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="500" fill="#64748B">多平台多账号</text>
  </g>

  <g>
