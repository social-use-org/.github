<svg width="1600" height="420" viewBox="0 0 1600 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Social-use workflow illustration">
  <defs>
    <linearGradient id="bg" x1="120" y1="54" x2="1478" y2="382" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07101C"/>
      <stop offset="1" stop-color="#102742"/>
    </linearGradient>
    <linearGradient id="line" x1="170" y1="210" x2="1430" y2="210" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34D399"/>
      <stop offset="1" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="bubble1" x1="160" y1="120" x2="340" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#14315A"/>
      <stop offset="1" stop-color="#0C1A31"/>
    </linearGradient>
    <linearGradient id="bubble2" x1="392" y1="120" x2="572" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#123A28"/>
      <stop offset="1" stop-color="#081713"/>
    </linearGradient>
    <linearGradient id="bubble3" x1="624" y1="120" x2="804" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#12233D"/>
      <stop offset="1" stop-color="#0B172A"/>
    </linearGradient>
    <linearGradient id="bubble4" x1="856" y1="120" x2="1036" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#123A28"/>
      <stop offset="1" stop-color="#081713"/>
    </linearGradient>
    <linearGradient id="bubble5" x1="1088" y1="120" x2="1268" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#311C20"/>
      <stop offset="1" stop-color="#160D11"/>
    </linearGradient>
    <linearGradient id="bubble6" x1="1320" y1="120" x2="1500" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1A1F2F"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="420" rx="32" fill="url(#bg)"/>
  <circle cx="196" cy="78" r="68" fill="#60A5FA" fill-opacity="0.12"/>
  <circle cx="1418" cy="72" r="82" fill="#34D399" fill-opacity="0.10"/>
  <path d="M170 210H1430" stroke="url(#line)" stroke-width="6" stroke-linecap="round" stroke-dasharray="2 18"/>

  <g>
    <rect x="120" y="112" width="180" height="196" rx="30" fill="url(#bubble1)" stroke="#60A5FA" stroke-opacity="0.20"/>
    <circle cx="210" cy="164" r="24" fill="#60A5FA"/>
    <text x="210" y="170" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#08111F">1</text>
    <text x="210" y="228" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#E2E8F0">输入主题</text>
    <text x="210" y="256" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="500" fill="#94A3B8">一句话描述目标</text>
  </g>

  <g>
    <rect x="352" y="112" width="180" height="196" rx="30" fill="url(#bubble2)" stroke="#34D399" stroke-opacity="0.20"/>
    <circle cx="442" cy="164" r="24" fill="#34D399"/>
    <text x="442" y="170" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#07111A">2</text>
    <text x="442" y="228" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#E2E8F0">AI 创作</text>
    <text x="442" y="256" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="500" fill="#94A3B8">生成标题和版本</text>
  </g>

  <g>
    <rect x="584" y="112" width="180" height="196" rx="30" fill="url(#bubble3)" stroke="#60A5FA" stroke-opacity="0.20"/>
    <circle cx="674" cy="164" r="24" fill="#60A5FA"/>
    <text x="674" y="170" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#08111F">3</text>
    <text x="674" y="228" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#E2E8F0">人工审核</text>
    <text x="674" y="256" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="500" fill="#94A3B8">确认内容后发布</text>
  </g>

  <g>
    <rect x="816" y="112" width="180" height="196" rx="30" fill="url(#bubble4)" stroke="#34D399" stroke-opacity="0.20"/>
    <circle cx="906" cy="164" r="24" fill="#34D399"/>
    <text x="906" y="170" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#07111A">4</text>
    <text x="906" y="228" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#E2E8F0">多平台发布</text>
    <text x="906" y="256" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="500" fill="#94A3B8">同步到多个账号</text>
  </g>

  <g>
    <rect x="1048" y="112" width="180" height="196" rx="30" fill="url(#bubble5)" stroke="#F59E0B" stroke-opacity="0.20"/>
    <circle cx="1138" cy="164" r="24" fill="#F59E0B"/>
    <text x="1138" y="170" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#0D0A09">5</text>
    <text x="1138" y="228" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#E2E8F0">互动运营</text>
    <text x="1138" y="256" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="500" fill="#94A3B8">评论、私信、跟进</text>
  </g>

  <g>
    <rect x="1280" y="112" width="180" height="196" rx="30" fill="url(#bubble6)" stroke="#94A3B8" stroke-opacity="0.20"/>
    <circle cx="1370" cy="164" r="24" fill="#94A3B8"/>
    <text x="1370" y="170" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#08111F">6</text>
    <text x="1370" y="228" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#E2E8F0">数据分析</text>
    <text x="1370" y="256" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="500" fill="#94A3B8">找到优化方向</text>
  </g>

  <path d="M300 210H352" stroke="#34D399" stroke-width="3" stroke-linecap="round"/>
  <path d="M342 202L352 210L342 218" stroke="#34D399" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M532 210H584" stroke="#60A5FA" stroke-width="3" stroke-linecap="round"/>
  <path d="M574 202L584 210L574 218" stroke="#60A5FA" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M764 210H816" stroke="#34D399" stroke-width="3" stroke-linecap="round"/>
  <path d="M806 202L816 210L806 218" stroke="#34D399" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M996 210H1048" stroke="#F59E0B" stroke-width="3" stroke-linecap="round"/>
  <path d="M1038 202L1048 210L1038 218" stroke="#F59E0B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M1228 210H1280" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>
  <path d="M1270 202L1280 210L1270 218" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="800" y="360" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#E2E8F0">从输入到发布，再到互动和分析，形成完整闭环</text>
  <text x="800" y="388" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#94A3B8">用更直观的流程图帮助中文访客快速理解 Social-use 的工作方式。</text>
</svg>
