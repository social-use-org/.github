<svg width="1600" height="420" viewBox="0 0 1600 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Social-use workflow">
  <rect x="1" y="1" width="1598" height="418" rx="28" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="88" y="70" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#0F172A">运营流程</text>
  <text x="88" y="104" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="500" fill="#64748B">从一个选题开始，完成内容、审核、发布、互动和复盘。</text>

  <path d="M160 228H1440" stroke="#CBD5E1" stroke-width="4" stroke-linecap="round"/>

  <g>
    <circle cx="190" cy="228" r="38" fill="#DBEAFE" stroke="#2563EB" stroke-width="3"/>
    <text x="190" y="236" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#1D4ED8">1</text>
    <text x="190" y="306" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" fill="#0F172A">输入主题</text>
    <text x="190" y="334" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="500" fill="#64748B">选题和目标</text>
  </g>

  <g>
    <circle cx="430" cy="228" r="38" fill="#DCFCE7" stroke="#16A34A" stroke-width="3"/>
